<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Mizan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0e2d2a;
      color: #e8dcc8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 1.5rem;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: block;
    }
    h1 { color: #c9a84c; font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { opacity: 0.6; font-size: 0.875rem; margin: 0 0 1.5rem; line-height: 1.6; }
    a {
      display: inline-block;
      background: #c9a84c;
      color: #0e2d2a;
      text-decoration: none;
      padding: 0.625rem 1.5rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <img src="/images/mizan-logo.png" alt="Mizan" class="logo" />
    <h1>You&rsquo;re offline</h1>
    <p>Reconnect to continue reading<br />the Quran with Mizan.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
